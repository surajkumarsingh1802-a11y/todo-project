<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daybook — Task Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1A1D23;
    --paper: #F7F4ED;
    --paper-raised: #FFFFFE;
    --sage: #6B8068;
    --sage-light: #DCE5DA;
    --coral: #D97757;
    --coral-light: #F5DDD2;
    --line: #E3DDCF;
    --muted: #8A8579;
    --shadow: rgba(26, 29, 35, 0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    background-image:
      radial-gradient(circle at 1px 1px, rgba(26,29,35,0.035) 1px, transparent 0);
    background-size: 22px 22px;
  }

  .app {
    max-width: 760px;
    margin: 0 auto;
    padding: 56px 24px 100px;
  }

  /* ===== Header ===== */
  header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 8px;
    border-bottom: 2px solid var(--ink);
    padding-bottom: 18px;
  }

  .brand {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .brand .eyebrow {
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--coral);
    font-weight: 600;
  }

  .brand h1 {
    font-family: 'Fraunces', serif;
    font-size: 38px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }

  .date-display {
    text-align: right;
    font-size: 13px;
    color: var(--muted);
    line-height: 1.5;
  }

  .date-display strong {
    display: block;
    color: var(--ink);
    font-size: 15px;
    font-weight: 600;
  }

  /* ===== Progress Arc ===== */
  .progress-row {
    display: flex;
    align-items: center;
    gap: 20px;
    margin: 28px 0 36px;
    padding: 18px 22px;
    background: var(--paper-raised);
    border: 1px solid var(--line);
    border-radius: 14px;
  }

  .arc-wrap { position: relative; width: 56px; height: 56px; flex-shrink: 0; }
  .arc-wrap svg { transform: rotate(-90deg); }
  .arc-bg { fill: none; stroke: var(--line); stroke-width: 6; }
  .arc-fg {
    fill: none;
    stroke: var(--sage);
    stroke-width: 6;
    stroke-linecap: round;
    transition: stroke-dasharray 0.5s ease;
  }
  .arc-label {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 700;
    font-family: 'Fraunces', serif;
  }

  .progress-text { flex: 1; }
  .progress-text .headline {
    font-family: 'Fraunces', serif;
    font-size: 17px;
    font-weight: 500;
  }
  .progress-text .sub {
    font-size: 13px;
    color: var(--muted);
    margin-top: 2px;
  }

  /* ===== Add Task ===== */
  .add-task {
    display: flex;
    gap: 10px;
    margin-bottom: 36px;
  }

  .add-task input[type="text"] {
    flex: 1;
    background: var(--paper-raised);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 13px 16px;
    font-family: 'Inter', sans-serif;
    font-size: 14.5px;
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
  }
  .add-task input[type="text"]::placeholder { color: var(--muted); }
  .add-task input[type="text"]:focus {
    border-color: var(--sage);
    box-shadow: 0 0 0 3px var(--sage-light);
  }

  select.period-select {
    background: var(--paper-raised);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 0 12px;
    font-family: 'Inter', sans-serif;
    font-size: 13.5px;
    color: var(--ink);
    outline: none;
    cursor: pointer;
  }

  .add-btn {
    background: var(--ink);
    color: var(--paper);
    border: none;
    border-radius: 10px;
    padding: 0 22px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s ease, transform 0.1s ease;
  }
  .add-btn:hover { background: var(--sage); }
  .add-btn:active { transform: scale(0.97); }

  /* ===== Sections ===== */
  .section { margin-bottom: 32px; }

  .section-head {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 14px;
  }

  .section-head h2 {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 500;
    font-size: 20px;
    color: var(--ink);
  }

  .section-head .count {
    font-size: 12px;
    color: var(--muted);
    font-weight: 500;
  }

  .section-head::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--line);
  }

  .task-list { display: flex; flex-direction: column; gap: 8px; }

  .empty-note {
    font-size: 13px;
    color: var(--muted);
    font-style: italic;
    padding: 10px 2px;
  }

  /* ===== Task Item ===== */
  .task {
    display: flex;
    align-items: center;
    gap: 13px;
    background: var(--paper-raised);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 13px 14px;
    transition: border-color 0.15s ease, transform 0.1s ease;
    animation: slideIn 0.25s ease;
  }
  .task:hover { border-color: #d3ccba; }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .checkbox {
    width: 21px;
    height: 21px;
    border-radius: 50%;
    border: 2px solid var(--sage);
    flex-shrink: 0;
    cursor: pointer;
    position: relative;
    background: transparent;
    transition: background 0.15s ease;
  }
  .checkbox.checked {
    background: var(--sage);
  }
  .checkbox.checked::after {
    content: '';
    position: absolute;
    left: 6px;
    top: 2px;
    width: 5px;
    height: 9px;
    border: solid var(--paper-raised);
    border-width: 0 2px 2px 0;
    transform: rotate(40deg);
  }

  .task-label {
    flex: 1;
    font-size: 14.5px;
    cursor: pointer;
    word-break: break-word;
  }
  .task.done .task-label {
    text-decoration: line-through;
    color: var(--muted);
  }

  .priority-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--coral);
    flex-shrink: 0;
  }

  .del-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 18px;
    cursor: pointer;
    line-height: 1;
    padding: 4px;
    opacity: 0;
    transition: opacity 0.15s ease, color 0.15s ease;
  }
  .task:hover .del-btn { opacity: 1; }
  .del-btn:hover { color: var(--coral); }

  /* ===== Empty state ===== */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .empty-state .glyph {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 22px;
    color: var(--ink);
    margin-bottom: 6px;
  }
  .empty-state p { font-size: 13.5px; }

  @media (max-width: 560px) {
    .app { padding: 36px 16px 80px; }
    .brand h1 { font-size: 30px; }
    header { flex-direction: column; align-items: flex-start; gap: 10px; }
    .date-display { text-align: left; }
    .add-task { flex-wrap: wrap; }
    select.period-select { order: 3; flex: 1; }
    .add-btn { order: 2; }
    .add-task input[type="text"] { order: 1; flex-basis: 100%; }
  }

  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important; }
  }
</style>
</head>
<body>
<div class="app">

  <header>
    <div class="brand">
      <span class="eyebrow">Daybook</span>
      <h1>Today's Tasks</h1>
    </div>
    <div class="date-display">
      <strong id="todayDate"></strong>
      <span id="taskCountSummary"></span>
    </div>
  </header>

  <div class="progress-row">
    <div class="arc-wrap">
      <svg width="56" height="56" viewBox="0 0 56 56">
        <circle class="arc-bg" cx="28" cy="28" r="23"></circle>
        <circle class="arc-fg" id="arcFg" cx="28" cy="28" r="23" stroke-dasharray="0 1000"></circle>
      </svg>
      <div class="arc-label" id="arcLabel">0%</div>
    </div>
    <div class="progress-text">
      <div class="headline" id="progressHeadline">A clean page to start with.</div>
      <div class="sub" id="progressSub">Add your first task below.</div>
    </div>
  </div>

  <div class="add-task">
    <input type="text" id="taskInput" placeholder="What needs doing?" maxlength="140" />
    <select class="period-select" id="periodSelect">
      <option value="morning">Morning</option>
      <option value="afternoon">Afternoon</option>
      <option value="evening">Evening</option>
    </select>
    <button class="add-btn" id="addBtn">Add</button>
  </div>

  <div id="sectionsContainer"></div>

  <div class="empty-state" id="globalEmpty" style="display:none;">
    <div class="glyph">The page is blank.</div>
    <p>Write down what tomorrow's you will thank you for.</p>
  </div>

</div>

<script>
  const PERIODS = [
    { key: 'morning', label: 'Morning' },
    { key: 'afternoon', label: 'Afternoon' },
    { key: 'evening', label: 'Evening' }
  ];

  let tasks = [];

  const sectionsContainer = document.getElementById('sectionsContainer');
  const taskInput = document.getElementById('taskInput');
  const periodSelect = document.getElementById('periodSelect');
  const addBtn = document.getElementById('addBtn');
  const globalEmpty = document.getElementById('globalEmpty');
  const arcFg = document.getElementById('arcFg');
  const arcLabel = document.getElementById('arcLabel');
  const progressHeadline = document.getElementById('progressHeadline');
  const progressSub = document.getElementById('progressSub');
  const taskCountSummary = document.getElementById('taskCountSummary');

  function formatDate() {
    const d = new Date();
    const opts = { weekday: 'long', month: 'long', day: 'numeric' };
    return d.toLocaleDateString('en-US', opts);
  }
  document.getElementById('todayDate').textContent = formatDate();

  function uid() {
    return 't' + Math.random().toString(36).slice(2, 10);
  }

  function addTask(text, period) {
    tasks.push({ id: uid(), text, period, done: false, createdAt: Date.now() });
    render();
  }

  function toggleTask(id) {
    const t = tasks.find(x => x.id === id);
    if (t) t.done = !t.done;
    render();
  }

  function deleteTask(id) {
    tasks = tasks.filter(x => x.id !== id);
    render();
  }

  function render() {
    sectionsContainer.innerHTML = '';

    if (tasks.length === 0) {
      globalEmpty.style.display = 'block';
    } else {
      globalEmpty.style.display = 'none';
    }

    PERIODS.forEach(period => {
      const items = tasks.filter(t => t.period === period.key);
      const section = document.createElement('div');
      section.className = 'section';

      const head = document.createElement('div');
      head.className = 'section-head';
      head.innerHTML = `<h2>${period.label}</h2><span class="count">${items.length ? items.filter(t=>t.done).length + ' / ' + items.length : ''}</span>`;
      section.appendChild(head);

      const list = document.createElement('div');
      list.className = 'task-list';

      if (items.length === 0) {
        const note = document.createElement('div');
        note.className = 'empty-note';
        note.textContent = 'Nothing planned yet.';
        list.appendChild(note);
      } else {
        items.forEach(t => {
          const row = document.createElement('div');
          row.className = 'task' + (t.done ? ' done' : '');

          const cb = document.createElement('div');
          cb.className = 'checkbox' + (t.done ? ' checked' : '');
          cb.addEventListener('click', () => toggleTask(t.id));

          const label = document.createElement('div');
          label.className = 'task-label';
          label.textContent = t.text;
          label.addEventListener('click', () => toggleTask(t.id));

          const del = document.createElement('button');
          del.className = 'del-btn';
          del.innerHTML = '&times;';
          del.setAttribute('aria-label', 'Delete task');
          del.addEventListener('click', () => deleteTask(t.id));

          row.appendChild(cb);
          row.appendChild(label);
          row.appendChild(del);
          list.appendChild(row);
        });
      }

      section.appendChild(list);
      sectionsContainer.appendChild(section);
    });

    updateProgress();
  }

  function updateProgress() {
    const total = tasks.length;
    const done = tasks.filter(t => t.done).length;
    const pct = total === 0 ? 0 : Math.round((done / total) * 100);
    const circumference = 2 * Math.PI * 23;
    const dash = (pct / 100) * circumference;
    arcFg.setAttribute('stroke-dasharray', `${dash} ${circumference}`);
    arcLabel.textContent = pct + '%';

    if (total === 0) {
      progressHeadline.textContent = "A clean page to start with.";
      progressSub.textContent = "Add your first task below.";
      taskCountSummary.textContent = '';
    } else if (done === total) {
      progressHeadline.textContent = "Every task crossed off.";
      progressSub.textContent = "That's a good day's work.";
      taskCountSummary.textContent = `${total} of ${total} done`;
    } else {
      progressHeadline.textContent = `${done} of ${total} done.`;
      progressSub.textContent = total - done === 1 ? "One left to go." : `${total - done} left to go.`;
      taskCountSummary.textContent = `${done} of ${total} done`;
    }
  }

  function handleAdd() {
    const text = taskInput.value.trim();
    if (!text) {
      taskInput.focus();
      return;
    }
    addTask(text, periodSelect.value);
    taskInput.value = '';
    taskInput.focus();
  }

  addBtn.addEventListener('click', handleAdd);
  taskInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') handleAdd();
  });

  render();
</script>
</body>
</html>
